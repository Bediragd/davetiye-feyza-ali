# =============================================================
# /etc/nginx/sites-available/davetiye-feyza-ali
# Bu dosyayı sunucuda /etc/nginx/sites-available/ altına kopyala,
# sites-enabled'a symlink at, ardından certbot ile HTTPS ekle.
# =============================================================

# HTTP -> sadece dinler; certbot HTTPS eklediğinde otomatik 301 redirect ekler.
server {
    listen 80;
    listen [::]:80;

    server_name davetiye-feyza-ali-agdemir.com www.davetiye-feyza-ali-agdemir.com 31.40.205.92;

    # Let's Encrypt webroot doğrulaması için (gerekirse)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Davetiye container'ına proxy
    location / {
        proxy_pass         http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # Erişim/hata logları (sorun olursa buradan bakılır)
    access_log /var/log/nginx/davetiye-access.log;
    error_log  /var/log/nginx/davetiye-error.log warn;
}
