server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # HTML dosyası önbelleğe alınmasın (her zaman taze)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Statik varlıklar uzun süre cache'lensin
    location ~* \.(?:css|js|png|jpe?g|gif|svg|webp|ico|mp3|mp4|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # RSVP API → txt dosyası
    location /api/ {
        proxy_pass http://rsvp-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 16k;
    }

    # Ana yönlendirme
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gizli dosyalara erişimi engelle
    location ~ /\.(?!well-known) {
        deny all;
    }

    # 404 sayfası
    error_page 404 /index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
