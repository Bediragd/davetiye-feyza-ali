<!-- Particle System Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            
            // Resize canvas to window size
            const resizeCanvas = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            const particles = [];
            const heartPath = new Path2D("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 100;
                    this.size = Math.random() * 1.5 + 0.5;
                    this.speedY = Math.random() * 0.5 + 0.1;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.type = Math.random() > 0.9 ? 'heart' : 'dust'; // 10% chance of being a heart
                    
                    if(this.type === 'heart') {
                        this.size = Math.random() * 10 + 5; // Hearts are bigger
                        this.speedY = Math.random() * 1 + 0.5; // Hearts move slightly faster
                    }
                }

                update() {
                    this.y -= this.speedY;
                    this.x += Math.sin(this.y * 0.01) + this.speedX; // Sway movement
                    
                    if (this.y < -50) {
                        this.y = canvas.height + 50;
                        this.x = Math.random() * canvas.width;
                    }
                }

                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    
                    if (this.type === 'dust') {
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (this.type === 'heart') {
                        ctx.translate(this.x, this.y);
                        // Scale down the SVG path to match desired size (original path is ~24x24)
                        const scale = this.size / 24;
                        ctx.scale(scale, scale);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; // White hearts
                        ctx.fill(heartPath);
                    }
                    
                    ctx.restore();
                }
            }

            // Init particles
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                requestAnimationFrame(animate);
            }

            animate();
        });
    </script>
