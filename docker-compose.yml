services:
  davetiye:
    build: .
    image: davetiye-feyza-ali:latest
    container_name: davetiye-feyza-ali
    restart: unless-stopped

    # Sadece localhost'tan erişilebilir — dışarıya host'taki nginx servis edecek.
    # 8090 portu doluysa boş bir port seçip aynısını nginx config'inde de güncelle.
    ports:
      - "127.0.0.1:8090:80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
