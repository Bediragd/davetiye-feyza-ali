services:
  davetiye:
    build: .
    image: davetiye-feyza-ali:latest
    container_name: davetiye-feyza-ali
    restart: unless-stopped
    depends_on:
      - rsvp-api

    ports:
      - "127.0.0.1:8090:80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rsvp-api:
    build: ./api
    image: davetiye-rsvp-api:latest
    container_name: davetiye-rsvp-api
    restart: unless-stopped
    volumes:
      - ./data:/data
